  <text x="950" y="195" font-family="Georgia,serif" font-size="52" font-weight="600" fill="#C9973A" text-anchor="middle">AED 500</text>
  <text x="950" y="235" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="middle">per exclusive Q-Lead</text>
