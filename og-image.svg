      <stop offset="0%" style="stop-color:#0E1F3D"/>
      <stop offset="100%" style="stop-color:#1a3a6e"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#C9973A;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0E1F3D;stop-opacity:0"/>
